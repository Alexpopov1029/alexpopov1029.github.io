<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oplot Discord Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px;
        }
        h1 {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #ffffff;
        }
        a {
            display: inline-block;
            padding: 12px 28px;
            background: #5865f2;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover { background: #4752c4; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Oplot Discord Server</h1>
        <a href="https://discord.gg/oplot" target="_blank">Присоединиться к серверу</a>
    </div>
</body>
</html>
